name: Build Android APK (Native Gradle)

# APK Canzoniere Facile via Gradle su GitHub Actions (no EAS, no siti esterni).
# Scarica l'APK da: Actions → ultimo workflow → Artifacts

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK with Gradle
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js 20
        uses: actions/setup-node@v4.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java JDK 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"
          java -version

      - name: Setup Android SDK
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          for i in $(seq 1 100); do echo y; done | "$SDKMANAGER" --licenses > /dev/null
          yes | "$SDKMANAGER" --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          "$SDKMANAGER" --list_installed | head -20

      - name: Install dependencies
        run: npm ci

      - name: Generate debug keystore for signing (sideload-friendly)
        run: |
          mkdir -p $HOME/.android
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkey -v -keystore $HOME/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Expo prebuild (genera progetto Android nativo)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Cache Gradle
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-canzoniere-gradle-${{ hashFiles('android/**/*.gradle*') }}

      - name: Make gradlew executable
        working-directory: ./android
        run: chmod +x ./gradlew

      - name: Build Release APK (firmato con debug keystore)
        working-directory: ./android
        env:
          GRADLE_OPTS: "-Xmx6g -Dfile.encoding=UTF-8 -XX:MaxMetaspaceSize=1g"
        run: |
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android \
            --no-daemon

      - name: Locate APK
        id: locate
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4.6.1
        with:
          name: canzoniere-facile-v${{ github.run_number }}-apk
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 30
